services:
  app:
    build: .
    container_name: jarvistrader-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./jarvis.db
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-supersecretkeychangeinproduction}
      - JARVIS_HOST=0.0.0.0
      - JARVIS_PORT=8000
      - PYTHONUNBUFFERED=1
    volumes:
      - ./reports:/tmp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - jarvistrader-net

