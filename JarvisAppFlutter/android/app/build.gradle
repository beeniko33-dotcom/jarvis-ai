plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'com.jarvis.ai.jarvis_app_flutter'
    compileSdk 34

    defaultConfig {
        applicationId 'com.jarvis.ai.jarvis_app_flutter'
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName '0.1.1'
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}