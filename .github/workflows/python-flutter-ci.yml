name: Python + Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run Python syntax check
        run: |
          python -m py_compile main.py api/bridge.py core/agent.py core/memory.py optimizer.py

  flutter-frontend:
    runs-on: ubuntu-latest
    needs: python-backend
    steps:
      - uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
      - name: Install Flutter dependencies
        run: |
          cd JarvisAppFlutter
          flutter pub get
      - name: Analyze Flutter project
        run: |
          cd JarvisAppFlutter
          flutter analyze
